; Values are not used anywhere, this is just a list of reserved URL keywords
[Keywords]
dashboard=
controls=
master=
tasks=
procedures=
config=
log=
run=
new=
logout=

; Format:
; URL path=Controller class name?argument1,argument2,...
[Routes]
/=Index
/dashboard=Dashboard
/controls/master=MasterConfig
/controls/tasks=Tasks
/controls/tasks/<0>/config=TaskConfig?<0>
/controls/tasks/<0>/log=TaskLog?<0>
/controls/procedures=Procedures
/controls/procedures/<0>/config=ProcedureConfig?<0>
/controls/procedures/<0>/run=Procedure?<0>
/controls/procedures/<0>/log=ProcedureLog?<0>
/controls/tasks/new=NewTask
/logout=Logout
