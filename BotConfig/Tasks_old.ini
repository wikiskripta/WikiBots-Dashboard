[Descriptions]
PageWithCategorizingTemplatesToucher = Úkon vynucující přepočítaní cache stránek, na kterých jsou použity šablony dočasně zařazující stránky do kategorií.
NoFileInfoTemplateInserter = Úkon vkládající šablonu {{Soubor bez informací}} na stránku nově nahraných souborů, které neobsahují šablonu {{Soubor}}.
AISpammerBlocker = Úkon vyhodnocující nově založené uživatelské stránky a v případě podezření, že se jedná o spammerský účet založený AI dočasně blokující daného uživatele a vkládající na jeho diskusní stránku šablonu {{Podezřelý učet}}.
BlockCategoryEmptier = Úkon odstraňující z Kategorie:Zablokovat uživatelské stránky, jejichž uživatelé jsou již zablokování.
UnclassifiedFileCategoryRemover = Úkon odstraňující Kategorie:Nezařazené soubory ze souborů, které jsou již do nějaké jiné konkrétní kategorie zařazeny.

